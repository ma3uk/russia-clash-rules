name: Convert Domain Lists to Clash YAML (Optimized & Parallel)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  process-domains:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🚀 Checkout repository
        uses: actions/checkout@v4

      - name: 📂 Create directories
        run: |
          mkdir -p output/summaries
          mkdir -p output/temp

      - name: 🛠️ Install Mihomo
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "Downloading mihomo $MIHOMO_VERSION..."
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/
          mihomo -v

      - name: 📝 Prepare Sources List
        run: |
          cat << 'EOF' > sources.txt
          https://community.antifilter.download/list/domains.lst|antifilter-community
          https://community.antifilter.download/list/community.lst|antifilter-community-ip
          https://antifilter.download/list/allyouneed.lst|antifilter
          https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/refs/heads/release/text/ru-blocked-community.txt|ru-blocked-ip-community
