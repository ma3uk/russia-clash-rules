          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/enzu_all.txt|enzu
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/bunnyway_all.txt|bunnyway
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/g-core_all.txt|g-core
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/zenlayer_all.txt|zenlayer
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/cloudru_all.txt|cloudru
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/facebook_all.txt|facebook
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/nforce_all.txt|nforce
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/m247_all.txt|m247
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/gemini.txt|gemini
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/intel.txt|intel
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/intel_all.txt|intel_as
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/riot_games_all.txt|riot-games
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/roscomandzor-iplist.txt|roscomandzor-iplist
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/telegram.txt|telegram
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/telegram_all.txt|telegram_as
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/twitter.txt|twitter
          https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/discord-voice/discord-voice_plain.txt|discord-ip
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/all_providers.txt|rknasnblock
          https://raw.githubusercontent.com/tread-lightly/CyberOK_Skipa_ips/refs/heads/main/lists/skipa_cidr.txt|cyberokscan
          https://raw.githubusercontent.com/C24Be/AS_Network_List/refs/heads/main/blacklists/blacklist.txt|rknscan
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/unicom_all.txt|unicom-shanghai
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/ibm_all.txt|ibm
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/linode_all.txt|linode
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/a2hosting_all.txt|a2hosting
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/dreamhost_all.txt|dreamhost
          https://raw.githubusercontent.com/stclaird/Cloud-IP-Address-Ranges/refs/heads/main/ipfiles/heroku-aws.ip.txt|heroku
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/yandex_all.txt|yandex
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/sber_all.txt|sber
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/vk_all.txt|vk
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/ozon_all.txt|ozon
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/wildberries_all.txt|wildberries
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/avito_all.txt|avito
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/x5_all.txt|x5
          EOF

      - name: ⚙️ Generate Worker Script
        run: |
          cat << 'EOF' > worker.sh
          #!/bin/bash
          url=$(echo "$1" | cut -d'|' -f1)
          custom_name=$(echo "$1" | cut -d'|' -f2)
          safe_name=$(echo "$custom_name" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/_/g' | sed 's/__/_/g' | sed 's/^_//;s/_$//')

          mixed_file="output/${safe_name}.yaml"
          ip_file="output/temp/${safe_name}-ip.yaml"
          domain_file="output/temp/${safe_name}-domain.yaml"

          echo "payload:" > "$mixed_file"
          echo "payload:" > "$ip_file"
          echo "payload:" > "$domain_file"

          curl -sfL --retry 3 --max-time 30 "$url" | tr -d '\r' | sed -E 's/#.*$//g' | awk -v mixed="$mixed_file" -v ipf="$ip_file" -v domf="$domain_file" '
            function canConvertToWildcard(pattern) {
              gsub(/^[ \t]+|[ \t]+$/, "", pattern);
              gsub(/^\^|\$$/, "", pattern);
              if (pattern ~ /^\\\*\./ && pattern !~ /[\^\$\[\]\{\}\+\|\?]/) return 1;
              else if (pattern ~ /^\*\./ && pattern !~ /[\^\$\[\]\{\}\+\|\?]/) return 1;
              else if (pattern ~ /^\.\*\\\./ && pattern !~ /[\^\$\[\]\{\}\+\|\?]/) {
                if (pattern !~ /\\\.[a-z]{2,}$/) return 0;
                return 1;
              }
              return 0;
            }
            
            function convertToWildcard(pattern,    result) {
              gsub(/^[ \t]+|[ \t]+$/, "", pattern);
              gsub(/^\^|\$$/, "", pattern);
              if (pattern ~ /^\\\*\./) { gsub(/^\\\*\./, "*.", pattern); gsub(/\\\./, ".", pattern); result = pattern; }
              else if (pattern ~ /^\*\./) { gsub(/\\\./, ".", pattern); result = pattern; }
              else if (pattern ~ /^\.\*\\\./) { gsub(/^\.\*\\\./, "*.", pattern); gsub(/\\\./, ".", pattern); result = pattern; }
              else { gsub(/\\\./, ".", pattern); result = "*." pattern; }
              if (result !~ /^\*\./) result = "*." result;
              return result;
            }

            {
              gsub(/^[ \t]+|[ \t]+$/, "", $0);
              if ($0 == "") next;
              out_rule = ""; is_ip = 0;

              if ($0 ~ /^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$/) {
                gsub(/[ \t]/, "", $0);
                split($0, parts, "/"); split(parts[1], octets, ".");
                valid = (length(octets) == 4);
                if (valid) {
                  for (i=1; i<=4; i++) { if (octets[i] !~ /^[0-9]+$/ || octets[i]+0 < 0 || octets[i]+0 > 255) { valid = 0; break; } }
                }
                if (valid) {
                  prefix = (length(parts) == 2) ? parts[2]+0 : 32;
                  if (prefix >= 0 && prefix <= 32) {
                    out_rule = "  - IP-CIDR," parts[1] "/" prefix; is_ip = 1;
                  }
                }
              }
              else if ($0 ~ /^[0-9a-fA-F:]+(\/[0-9]{1,3})?$/ || $0 ~ /^[0-9a-fA-F:]+\.[0-9\.]+(\/[0-9]{1,3})?$/) {
                gsub(/[ \t]/, "", $0); if ($0 ~ /:/) { out_rule = "  - IP-CIDR6," $0; is_ip = 1; }
              }
              else if ($0 ~ /^domain:/) {
                domain = substr($0, 8); gsub(/^[ \t]+|[ \t]+$/, "", domain);
                if (domain ~ /^\*/) { gsub(/^\*\./, "", domain); out_rule = "  - DOMAIN-SUFFIX," domain; }
                else if (domain ~ /\*$/) { gsub(/\*$/, "", domain); out_rule = "  - DOMAIN-KEYWORD," domain; }
                else { out_rule = "  - DOMAIN-SUFFIX," domain; }
              }
              else if ($0 ~ /^full:/) {
                domain = substr($0, 6); gsub(/^[ \t]+|[ \t]+$/, "", domain); out_rule = "  - DOMAIN-SUFFIX," domain;
              }
              else if ($0 ~ /^regexp:/) {
                regex = substr($0, 9); gsub(/^[ \t]+|[ \t]+$/, "", regex);
                if (canConvertToWildcard(regex)) { out_rule = "  - DOMAIN-WILDCARD," convertToWildcard(regex); }
                else { gsub(/\\/, "\\\\", regex); out_rule = "  - DOMAIN-REGEX," regex; }
              }
              else if ($0 ~ /^geosite:/) { next; }
              else if ($0 ~ /\\\.|\\[a-zA-Z]|^[\^]|\$$|\[[^\]]+\]|\{[0-9,]+\}|\|/ || ($0 ~ /[\+\*\?]/ && ($0 ~ /\.[a-z]{2,}$/ || $0 ~ /\.[a-z]{2,}\$$/))) {
                if (canConvertToWildcard($0)) { out_rule = "  - DOMAIN-WILDCARD," convertToWildcard($0); }
                else {
                  if ($0 ~ /\\\.com$/) gsub(/\\\.com$/, "\\\\\\.com", $0);
                  if ($0 ~ /\\\.net$/) gsub(/\\\.net$/, "\\\\\\.net", $0);
                  gsub(/\\/, "\\\\", $0);
                  if ($0 !~ /^\^/ && $0 !~ /\$$/) $0 = "^" $0 "$";
                  out_rule = "  - DOMAIN-REGEX," $0;
                }
              }
              else {
                if ($0 ~ /^\*/) { gsub(/^\*\./, "", $0); out_rule = "  - DOMAIN-SUFFIX," $0; }
                else if ($0 ~ /\*$/) { gsub(/\*$/, "", $0); out_rule = "  - DOMAIN-KEYWORD," $0; }
                else { out_rule = "  - DOMAIN-SUFFIX," $0; }
              }

              if (out_rule != "") {
                print out_rule >> mixed;
                if (is_ip) { print out_rule >> ipf; } else { print out_rule >> domf; }
              }
            }'

          rules_count=$(grep -c '^  - ' "$mixed_file" || true)

          if [ "$rules_count" -eq 0 ]; then
            echo "⚠️ SKIPPED (Empty/Failed): $safe_name"
            rm -f "$mixed_file" "$ip_file" "$domain_file"
            exit 0
          fi

          echo "✅ Processed $safe_name ($rules_count rules)"

          # Конвертация MRS (IP)
          ip_count=$(grep -c '^  -' "$ip_file" || true)
          if [ "$ip_count" -gt 0 ]; then
            mihomo convert-ruleset ipcidr yaml "$ip_file" "output/${safe_name}-ipcidr.mrs" >/dev/null 2>&1 || true
            if [ ! -s "output/${safe_name}-ipcidr.mrs" ]; then
              rm -f "output/${safe_name}-ipcidr.mrs"
            fi
          fi

          # Конвертация MRS (Domain)
          domain_count=$(grep -c '^  -' "$domain_file" || true)
          if [ "$domain_count" -gt 0 ]; then
            mihomo convert-ruleset domain yaml "$domain_file" "output/${safe_name}.mrs" >/dev/null 2>&1 || true
            if [ ! -s "output/${safe_name}.mrs" ]; then
              rm -f "output/${safe_name}.mrs"
            fi
          fi

          file_size=$(numfmt --to=iec-i --suffix=B --format="%.1f" $(stat -c%s "$mixed_file") 2>/dev/null || echo "?")
          echo "- $safe_name.yaml ($file_size, $rules_count rules)" > "output/summaries/${safe_name}.txt"
          EOF
          chmod +x worker.sh

      - name: 🔄 Process All Lists (Parallel)
        run: cat sources.txt | xargs -P 10 -n 1 bash worker.sh

      - name: 🧹 Final cleanup for 0-byte files
        run: |
          find output -type f -size 0 -print -delete
          echo "Checked and removed any 0-byte files."

      - name: 📊 Consolidate Release Notes
        run: |
          echo "files_list<<EOF" >> $GITHUB_ENV
          if ls output/summaries/*.txt 1> /dev/null 2>&1; then
            cat output/summaries/*.txt | sort >> $GITHUB_ENV
          else
            echo "No files generated!" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: 🏷️ Generate release tag
        id: tag
        run: echo "RELEASE_TAG=v$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: 📤 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Clash Rules"
          body: |
            **Available files with proper YAML formatting:**
            ${{ env.files_list }}
          files: |
            output/*.yaml
            output/*.mrs
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗑️ Cleanup
        if: always()
        run: rm -rf output/
