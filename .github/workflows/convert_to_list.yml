          https://raw.githubusercontent.com/dartraiden/no-russia-hosts/refs/heads/master/hosts.txt|blocked-from-outside
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/akamai_all.txt|akamai
          https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/F5_all.txt|F5
