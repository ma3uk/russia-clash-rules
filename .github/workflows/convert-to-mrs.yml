name: Convert Domain Lists to Clash YAML (IP + V2Ray + Wildcard Support)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  process-domains:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🚀 Checkout repository
        uses: actions/checkout@v4

      - name: 📂 Create output directory
        run: mkdir -p output

      - name: 🛠️ Install Mihomo for MRS conversion
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "Downloading mihomo $MIHOMO_VERSION..."
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/
          mihomo -v

      - name: 📝 Create Python validator script
        run: |
          cat > validate_ip.py << 'PYEOF'
          import sys
          import ipaddress
          
          def process_ip(line):
              line = line.strip()
              if not line or not line.startswith('- '):
                  return None
              line = line[2:]
              parts = line.split(',', 1)
              if len(parts) != 2:
                  return None
              rule_type = parts[0].strip()
              ip_part = parts[1].strip()
              if rule_type not in ('IP-CIDR', 'IP-CIDR6'):
                  return None
              try:
                  network = ipaddress.ip_network(ip_part, strict=False)
                  # Mihomo expects IP-CIDR for both IPv4 and IPv6 in rule-providers
                  return f"  - IP-CIDR,{network}"
              except ValueError:
                  return None
          
          if __name__ == '__main__':
              for line in sys.stdin:
                  res = process_ip(line)
                  if res:
                      print(res)
          PYEOF
          chmod +x validate_ip.py

      - name: 🔍 Process domain lists with proper YAML formatting
        id: process_files
        run: |
          declare -A sources=(
            ["https://community.antifilter.download/list/domains.lst"]="antifilter-community"
            ["https://community.antifilter.download/list/community.lst"]="antifilter-community-ip"
            ["https://antifilter.download/list/allyouneed.lst"]="antifilter"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/category-ads-all.txt"]="ads-all"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/discord.txt"]="discord"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/google.txt"]="google"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/refilter.txt"]="refilter"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/ru-blocked-all.txt"]="ru-blocked-all"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/ru-blocked.txt"]="ru-blocked"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/win-extra.txt"]="win-extra"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/win-spy.txt"]="win-spy"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/win-update.txt"]="win-update"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/youtube.txt"]="youtube"
            ["https://raw.githubusercontent.com/dartraiden/no-russia-hosts/refs/heads/master/hosts.txt"]="blocked-from-outside"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/akamai/akamai_plain.txt"]="akamai"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/aws/aws_plain.txt"]="amazon"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/autodesk.txt"]="autodesk"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/azure.txt"]="azure"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/cloudflare/cloudflare_plain.txt"]="cloudflare"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/cogent/cogent_plain.txt"]="cogent"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/constant/constant_plain.txt"]="constant"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/contabo/contabo_plain.txt"]="contabo"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/datacamp/datacamp_plain.txt"]="datacamp"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/buyvm/buyvm_plain.txt"]="buyvm"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/fastly/fastly_plain.txt"]="fastly"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/gcore/gcore_plain.txt"]="gcore"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/glesys/glesys_plain.txt"]="glesys"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/gthost/gthost_plain.txt"]="gthost"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/melbicom/melbicom_plain.txt"]="melbicom"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/meta/meta_plain.txt"]="meta"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/oracle/oracle_plain.txt"]="oracle"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/ovh/ovh_plain.txt"]="ovh"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/scalaxy/scalaxy_plain.txt"]="scalaxy"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/scaleway/scaleway_plain.txt"]="scaleway"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/telegram/telegram_plain.txt"]="telegram-iplist"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/vercel/vercel_plain.txt"]="vercel"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/gemini.txt"]="gemini"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/hetzner/hetzner_plain.txt"]="hetzner"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/intel.txt"]="intel"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/riot-games.txt"]="riot-games"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/roscomandzor-iplist.txt"]="roscomandzor-iplist"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/telegram.txt"]="telegram"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/twitter.txt"]="twitter"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/discord-voice/discord-voice_plain.txt"]="discord-ip"
            ["https://raw.githubusercontent.com/123jjck/cdn-ip-ranges/refs/heads/main/digitalocean/digitalocean_plain.txt"]="digitalocean"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/all_providers.txt"]="rknasnblock"
            ["https://raw.githubusercontent.com/tread-lightly/CyberOK_Skipa_ips/refs/heads/main/lists/skipa_cidr.txt"]="cyberokscan"
            ["https://raw.githubusercontent.com/C24Be/AS_Network_List/refs/heads/main/blacklists/blacklist.txt"]="rknscan"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/custom_lists/unicom-shanghai.txt"]="unicom-shanghai"
            ["https://raw.githubusercontent.com/stclaird/Cloud-IP-Address-Ranges/refs/heads/main/ipfiles/godaddy-AS26496.ip.txt"]="godaddy"
            ["https://raw.githubusercontent.com/stclaird/Cloud-IP-Address-Ranges/refs/heads/main/ipfiles/softlayer-ibm.ip.txt"]="ibm"
            ["https://raw.githubusercontent.com/stclaird/Cloud-IP-Address-Ranges/refs/heads/main/ipfiles/linode.ip.txt"]="linode"
            ["https://raw.githubusercontent.com/stclaird/Cloud-IP-Address-Ranges/refs/heads/main/ipfiles/a2hosting.ip.txt"]="a2hosting"
            ["https://raw.githubusercontent.com/stclaird/Cloud-IP-Address-Ranges/refs/heads/main/ipfiles/dreamhost-AS26347.ip.txt"]="dreamhost"
            ["https://raw.githubusercontent.com/stclaird/Cloud-IP-Address-Ranges/refs/heads/main/ipfiles/heroku-aws.ip.txt"]="heroku"
          )
          
          file_list=""
          
          for url in "${!sources[@]}"; do
            custom_name="${sources[$url]}"
            safe_name=$(echo "$custom_name" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/_/g' | sed 's/__/_/g' | sed 's/^_//;s/_$//')
            
            echo "📥 Processing $url → $safe_name.yaml"
            
            curl -sfL "$url" | tr -d '\r' | sed -E 's/#.*$//g' | sed -E 's/^[ \t]*//; s/[ \t]*$//' | grep -vE '^$|://' | \
            awk -v name="$safe_name" '
              BEGIN { print "payload:" }
              {
                gsub(/^[ \t]+|[ \t]+$/, "", $0);
                if ($0 == "") next;
                
                # 1. IPv4/CIDR DETECTION
                if ($0 ~ /^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$/) {
                  gsub(/[ \t]/, "", $0);
                  split($0, parts, "/");
                  ip = parts[1];
                  split(ip, octets, ".");
                  valid = 1;
                  if (length(octets) != 4) valid = 0;
                  else {
                    for (i=1; i<=4; i++) {
                      if (octets[i] !~ /^[0-9]+$/ || octets[i]+0 < 0 || octets[i]+0 > 255) { valid = 0; break; }
                    }
                  }
                  if (valid) {
                    if (length(parts) == 2) {
                      prefix = parts[2] + 0;
                      if (prefix >= 0 && prefix <= 32) { print "  - IP-CIDR," ip "/" prefix; next; }
                    } else { print "  - IP-CIDR," ip "/32"; next; }
                  }
                }
                
                # 2. IPv6/CIDR DETECTION
                else if ($0 ~ /^[0-9a-fA-F:]+(\/[0-9]{1,3})?$/ || $0 ~ /^[0-9a-fA-F:]+\.[0-9\.]+(\/[0-9]{1,3})?$/) {
                  gsub(/[ \t]/, "", $0);
                  if ($0 ~ /:/) { print "  - IP-CIDR6," $0; next; }
                }
                
                # 3. V2Ray prefix handling
                if ($0 ~ /^domain:/) {
                  domain = substr($0, 8);
                  gsub(/^[ \t]+|[ \t]+$/, "", domain);
                  if (domain ~ /^\*/) { gsub(/^\*\./, "", domain); print "  - DOMAIN-SUFFIX," domain; }
                  else if (domain ~ /\*$/) { gsub(/\*$/, "", domain); print "  - DOMAIN-KEYWORD," domain; }
                  else { print "  - DOMAIN-SUFFIX," domain; }
                  next;
                }
                else if ($0 ~ /^full:/) {
                  domain = substr($0, 6);
                  gsub(/^[ \t]+|[ \t]+$/, "", domain);
                  print "  - DOMAIN-SUFFIX," domain;
                  next;
                }
                else if ($0 ~ /^regexp:/) {
                  regex = substr($0, 9);
                  gsub(/^[ \t]+|[ \t]+$/, "", regex);
                  if (canConvertToWildcard(regex)) { print "  - DOMAIN-WILDCARD," convertToWildcard(regex); }
                  else { gsub(/\\/, "\\\\", regex); print "  - DOMAIN-REGEX," regex; }
                  next;
                }
                else if ($0 ~ /^geosite:/) { next; }
                
                # 4. AUTOMATIC WILDCARD DETECTION
                if ($0 ~ /\\\.|\\[a-zA-Z]|^[\^]|\$$|\[[^\]]+\]|\{[0-9,]+\}|\|/ || 
                    ($0 ~ /[\+\*\?]/ && ($0 ~ /\.[a-z]{2,}$/ || $0 ~ /\.[a-z]{2,}\$$/))) {
                  if (canConvertToWildcard($0)) { print "  - DOMAIN-WILDCARD," convertToWildcard($0); next; }
                  if ($0 ~ /\\\.com$/) gsub(/\\\.com$/, "\\\\\\.com", $0);
                  if ($0 ~ /\\\.net$/) gsub(/\\\.net$/, "\\\\\\.net", $0);
                  gsub(/\\/, "\\\\", $0);
                  if ($0 !~ /^\^/ && $0 !~ /\$$/) $0 = "^" $0 "$";
                  print "  - DOMAIN-REGEX," $0;
                  next;
                }
                
                # 5. Final domain processing
                if ($0 ~ /^\*/) { gsub(/^\*\./, "", $0); print "  - DOMAIN-SUFFIX," $0; }
                else if ($0 ~ /\*$/) { gsub(/\*$/, "", $0); print "  - DOMAIN-KEYWORD," $0; }
                else { print "  - DOMAIN-SUFFIX," $0; }
              }
              
              function canConvertToWildcard(pattern) {
                gsub(/^[ \t]+|[ \t]+$/, "", pattern);
                gsub(/^\^|\$$/, "", pattern);
                if (pattern ~ /^\\\*\./ && pattern !~ /[\^\$\[\]\{\}\+\|\?]/) return 1;
                else if (pattern ~ /^\*\./ && pattern !~ /[\^\$\[\]\{\}\+\|\?]/) return 1;
                else if (pattern ~ /^\.\*\\\./ && pattern !~ /[\^\$\[\]\{\}\+\|\?]/) {
                  if (pattern !~ /\\\.[a-z]{2,}$/) return 0;
                  return 1;
                }
                return 0;
              }
              
              function convertToWildcard(pattern,    result) {
                gsub(/^[ \t]+|[ \t]+$/, "", pattern);
                gsub(/^\^|\$$/, "", pattern);
                if (pattern ~ /^\\\*\./) { gsub(/^\\\*\./, "*.", pattern); gsub(/\\\./, ".", pattern); result = pattern; }
                else if (pattern ~ /^\*\./) { gsub(/\\\./, ".", pattern); result = pattern; }
                else if (pattern ~ /^\.\*\\\./) { gsub(/^\.\*\\\./, "*.", pattern); gsub(/\\\./, ".", pattern); result = pattern; }
                else { gsub(/\\\./, ".", pattern); result = "*." pattern; }
                if (result !~ /^\*\./) result = "*." result;
                return result;
              }
            ' > "output/${safe_name}.yaml"
            
            if [ ! -s "output/${safe_name}.yaml" ]; then
              echo "❌ EMPTY FILE: $safe_name.yaml from $url"
              exit 1
            fi
            
            rules_count=$(grep -c '^  - ' "output/${safe_name}.yaml" || true)
            echo "✅ Created $safe_name.yaml ($rules_count rules)"
            
            file_size=$(numfmt --to=iec-i --suffix=B --format="%.1f" $(stat -c%s "output/${safe_name}.yaml") 2>/dev/null || echo "?")
            file_list+="- $safe_name.yaml ($file_size, $rules_count rules)\n"

            # ==========================================
            # Validate IPs with Python and create MRS files
            # ==========================================
            echo "  🔍 Validating and converting to .mrs..."

            # 1. Domain rules (Fixed regex)
            grep -E '^  - DOMAIN(-SUFFIX|-KEYWORD)?,' "output/${safe_name}.yaml" > "output/${safe_name}-domain-temp.yaml" 2>/dev/null || true
            if [ -s "output/${safe_name}-domain-temp.yaml" ]; then
              echo "payload:" > "output/${safe_name}-domain.yaml"
              cat "output/${safe_name}-domain-temp.yaml" >> "output/${safe_name}-domain.yaml"
              
              if mihomo convert-ruleset domain yaml "output/${safe_name}-domain.yaml" "output/${safe_name}.mrs" >mihomo.log 2>&1; then
                echo "  ✅ Created ${safe_name}.mrs (domain)"
                mrs_size=$(numfmt --to=iec-i --suffix=B --format="%.1f" $(stat -c%s "output/${safe_name}.mrs") 2>/dev/null || echo "?")
                file_list+="- ${safe_name}.mrs ($mrs_size)\n"
              else
                echo "  ⚠️ Failed to create ${safe_name}.mrs (domain): $(cat mihomo.log)"
              fi
              rm -f "output/${safe_name}-domain.yaml" "output/${safe_name}-domain-temp.yaml" mihomo.log
            fi

            # 2. IP rules (Python forces IP-CIDR for mihomo compatibility)
            grep -E '^  - IP-CIDR6?,' "output/${safe_name}.yaml" | python3 validate_ip.py > "output/${safe_name}-ipcidr-temp.yaml" 2>/dev/null || true
            if [ -s "output/${safe_name}-ipcidr-temp.yaml" ]; then
              echo "payload:" > "output/${safe_name}-ipcidr.yaml"
              cat "output/${safe_name}-ipcidr-temp.yaml" >> "output/${safe_name}-ipcidr.yaml"
              
              if mihomo convert-ruleset ipcidr yaml "output/${safe_name}-ipcidr.yaml" "output/${safe_name}-ipcidr.mrs" >mihomo.log 2>&1; then
                echo "  ✅ Created ${safe_name}-ipcidr.mrs"
                mrs_size=$(numfmt --to=iec-i --suffix=B --format="%.1f" $(stat -c%s "output/${safe_name}-ipcidr.mrs") 2>/dev/null || echo "?")
                file_list+="- ${safe_name}-ipcidr.mrs ($mrs_size)\n"
              else
                echo "  ⚠️ Failed to create ${safe_name}-ipcidr.mrs: $(cat mihomo.log)"
              fi
              rm -f "output/${safe_name}-ipcidr.yaml" "output/${safe_name}-ipcidr-temp.yaml" mihomo.log
            fi
          done
          
          echo "files_list<<EOF" >> $GITHUB_ENV
          echo -e "$file_list" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🏷️ Generate release tag
        id: tag
        run: echo "RELEASE_TAG=v$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: 📤 Create GitHub Release with Individual Files
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Clash Rules"
          body: |
            **Available files with proper YAML formatting:**
            ${{ env.files_list }}
          files: |
            output/*.yaml
            output/*.mrs
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗑️ Cleanup
        if: always()
        run: rm -rf output/
