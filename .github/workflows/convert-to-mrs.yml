name: Convert Domain Lists to Clash YAML (IP + V2Ray + Wildcard Support)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  process-domains:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🚀 Checkout repository
        uses: actions/checkout@v4

      - name: 📂 Create output directory
        run: mkdir -p output

      - name: 🛠️ Install Mihomo for MRS conversion
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "Downloading mihomo $MIHOMO_VERSION..."
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/
          mihomo -v

      - name: 📝 Create Python converter script for MRS
        run: |
          cat > convert_to_mrs.py << 'PYEOF'
          import sys
          import ipaddress

          def process_line(line):
              line = line.strip()
              if not line or not line.startswith('- '):
                  return None, None
              line = line[2:]
              
              parts = line.split(',', 1)
              if len(parts) != 2:
                  return None, None
                  
              rule_type = parts[0].strip()
              value = parts[1].strip()
              
              # For IP rules, strip "IP-CIDR," and normalize
              if rule_type in ('IP-CIDR', 'IP-CIDR6'):
                  try:
                      network = ipaddress.ip_network(value, strict=False)
                      return 'ipcidr', f"  - {network}"
                  except ValueError:
                      return None, None
                      
              # For domain rules, strip prefixes and use rule-provider format
              elif rule_type == 'DOMAIN':
                  return 'domain', f"  - {value}"
              elif rule_type == 'DOMAIN-SUFFIX':
                  return 'domain', f"  - .{value}"  # Mihomo uses '.' prefix for suffix
              elif rule_type == 'DOMAIN-WILDCARD':
                  return 'domain', f"  - {value}"
                  
              # DOMAIN-KEYWORD and DOMAIN-REGEX are not supported in optimized domain mrs
              return None, None

          if __name__ == '__main__':
              ip_file = sys.argv[1]
              domain_file = sys.argv[2]
              
              with open(ip_file, 'w') as f_ip, open(domain_file, 'w') as f_domain:
                  f_ip.write("payload:\n")
                  f_domain.write("payload:\n")
                  
                  for line in sys.stdin:
                      rtype, formatted = process_line(line)
                      if rtype == 'ipcidr':
                          f_ip.write(formatted + "\n")
                      elif rtype == 'domain':
                          f_domain.write(formatted + "\n")
          PYEOF
          chmod +x convert_to_mrs.py

      - name: 🔍 Process domain lists with proper YAML formatting
        id: process_files
        run: |
          declare -A sources=(
            ["https://community.antifilter.download/list/domains.lst"]="antifilter-community"
            ["https://community.antifilter.download/list/community.lst"]="antifilter-community-ip"
            ["https://antifilter.download/list/allyouneed.lst"]="antifilter"
            ["https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/refs/heads/release/text/ru-blocked-community.txt"]="ru-blocked-ip-community"
            ["https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/refs/heads/release/text/ru-blocked.txt"]="ru-blocked-ip"
            ["https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/refs/heads/release/text/ru-whitelist.txt"]="ru-whitelist-ip"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/category-ads-all.txt"]="ads-all"
            ["https://github.com/runetfreedom/russia-blocked-geosite/releases/latest/download/discord.txt"]="discord"
