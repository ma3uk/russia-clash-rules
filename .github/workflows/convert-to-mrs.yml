            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/carpathia_all.txt"]="carpathia"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/carpathia_all.txt"]="egihosting"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/enzu_all.txt"]="enzu"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/bunnyway_all.txt"]="bunnyway"
            ["https://raw.githubusercontent.com/ma3uk/russia-clash-rules/refs/heads/main/AS_IP-CIDR/g-core_all.txt"]="gcore"
