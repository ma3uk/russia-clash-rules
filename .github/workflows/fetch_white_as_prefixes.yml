name: Fetch White AS Prefixes
on:
  schedule:
    - cron: "0 */7 * * *"   # Every 7 hours
  workflow_dispatch:         # Manual trigger

jobs:
  fetch-prefixes:
    runs-on: ubuntu-latest
    # Явно разрешаем запись в репозиторий для GitHub Actions токена
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch white prefixes for AS list
        run: |
          # Включаем режим мониторинга задач для корректной работы 'jobs' в CI
          set -m

          declare -A AS_GROUPS=(
            ["riot_games"]="6507 38118 62830"
            ["yandex"]="13238 44534 200350"
            ["yandex_cloud"]="215013 200350"
            ["vk"]="28709 47541 47542 207970 211963 213235 47764"
            ["sber"]="33844 35237 47457"
            ["keh_commerce"]="201012"
            ["global_cloud"]="204720"
            ["internet_solution"]="44386 138254 207986"
            ["wildberries"]="57073"
            ["x5"]="44704 198027 215810 201706 215013"
            ["er-telecom"]="9049 12768"
            ["trc_fiord"]="51369"
            ["rostelecom"]="12389 25510 48044"
            ["edgecenter"]="210756"
            ["hll_llc"]="51115 197068"
            ["ddos_guard"]="57724 44556"
            ["cdnvideo"]="57363"
            ["cluster"]="21030"
            ["selectel"]="49505 50340 61976"
            ["beeline"]="3216 8371"
            ["cloudru"]="208677"
            ["megafon"]="31133 12714"
            ["ivi"]="57629"
            ["2gis"]="197482"
          )

          mkdir -p AS_IP-CIDR

          all_global="AS_IP-CIDR/all_white_providers.txt"
          all_global_v4="AS_IP-CIDR/all_white_providers_v4.txt"
          all_global_v6="AS_IP-CIDR/all_white_providers_v6.txt"

          : > "$all_global"
          : > "$all_global_v4"
          : > "$all_global_v6"

          MAX_JOBS=5   # Оптимальный лимит для обхода банов RIPE API
          pids=()

          echo "=== ФАЗА 1: Параллельное скачивание данных ==="
          
          for group in "${!AS_GROUPS[@]}"; do
            for asn in ${AS_GROUPS[$group]}; do
              
              (
                url="https://stat.ripe.net/data/announced-prefixes/data.json?resource=AS${asn}"
                json=$(curl -s --max-time 15 --retry 3 --retry-delay 2 "$url")

                if [[ -z "$json" ]] || ! echo "$json" | jq -e '.data.prefixes' >/dev/null 2>&1; then
                  echo "  [ПРОПУСК] AS$asn ($group) — пустой ответ или лимит запросов."
                  exit 0
                fi

                as_file="AS_IP-CIDR/${group}_${asn}.txt"
                as_file_v4="AS_IP-CIDR/${group}_${asn}_v4.txt"
                as_file_v6="AS_IP-CIDR/${group}_${asn}_v6.txt"

                echo "$json" | jq -r '.data.prefixes[].prefix' | sort -u > "$as_file"
                grep -E '^[0-9]+\.' "$as_file" | sort -u > "$as_file_v4" || true
                grep -E '^[0-9a-fA-F:]+:' "$as_file" | sort -u > "$as_file_v6" || true
                
                echo "  [ОК] Скачан AS$asn для группы $group"
              ) &

              pids+=($!)

              # Надежный CI-менеджер потоков через PID-массив
              while [[ ${#pids[@]} -ge $MAX_JOBS ]]; do
                still_running=()
                for pid in "${pids[@]}"; do
                  if kill -0 "$pid" 2>/dev/null; then
                    still_running+=("$pid")
                  fi
                done
                pids=("${still_running[@]}")
                
                if [[ ${#pids[@]} -ge $MAX_JOBS ]]; then
                  sleep 0.2
                fi
              done

            done
          done

          wait
          echo "Все префиксы скачаны во временные файлы."

          echo "=== ФАЗА 2: Сборка и фильтрация глобальных файлов ==="

          for group in "${!AS_GROUPS[@]}"; do
            combined="AS_IP-CIDR/${group}_all.txt"
            combined_v4="AS_IP-CIDR/${group}_all_v4.txt"
            combined_v6="AS_IP-CIDR/${group}_all_v6.txt"

            : > "$combined"
            : > "$combined_v4"
            : > "$combined_v6"

            for asn in ${AS_GROUPS[$group]}; do
              as_file="AS_IP-CIDR/${group}_${asn}.txt"
              as_file_v4="AS_IP-CIDR/${group}_${asn}_v4.txt"
              as_file_v6="AS_IP-CIDR/${group}_${asn}_v6.txt"

              if [[ -f "$as_file" ]]; then
                cat "$as_file" >> "$combined"
                [[ "$group" != "blocked_asn" ]] && cat "$as_file" >> "$all_global"
              fi

              if [[ -f "$as_file_v4" ]]; then
                cat "$as_file_v4" >> "$combined_v4"
                [[ "$group" != "blocked_asn" ]] && cat "$as_file_v4" >> "$all_global_v4"
              fi

              if [[ -f "$as_file_v6" ]]; then
                cat "$as_file_v6" >> "$combined_v6"
                [[ "$group" != "blocked_asn" ]] && cat "$as_file_v6" >> "$all_global_v6"
              fi
            done

            sort -u "$combined" -o "$combined"
            sort -u "$combined_v4" -o "$combined_v4"
            sort -u "$combined_v6" -o "$combined_v6"
          done

          sort -u "$all_global" -o "$all_global"
          sort -u "$all_global_v4" -o "$all_global_v4"
          sort -u "$all_global_v6" -o "$all_global_v6"

          echo "=== ФАЗА 3: Очистка единичных файлов ==="
          # Удаляет промежуточные файлы AS, оставляя только чистые итоговые отчеты
          find AS_IP-CIDR/ -type f ! -name "*_all*" ! -name "all_providers*" -delete

          echo "Все глобальные файлы успешно сгенерированы."

      - name: Commit results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add AS_IP-CIDR || true
          
          if git diff --cached --quiet; then
            echo "Изменений не обнаружено. Пропускаем коммит."
            exit 0
          fi
          
          git commit -m "Update AS prefix lists (multi-threaded, PID-managed)"
          # Безопасный пуш с явным указанием активной ветки воркфлоу
          git push origin HEAD:${{ github.ref_name }}
