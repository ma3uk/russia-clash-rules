name: Fetch AS Prefixes
on:
    schedule:
        - cron: "0 */6 * * *"  # Every 6 hours
      workflow_dispatch:       # Manual trigger

jobs:
  fetch-prefixes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch prefixes for AS list
        run: |
          declare -A AS_GROUPS=(
            ["cloudflare"]="13335 14789 132892 209242"
            ["akamai"]="18717 22207 20189 12222 16702 16625 20940 23454 23455 30675 33905 32787 35993 36029 393234 393560 63949 6183 24319 35994 18680"
            ["fastly"]="895 54113 149097"
            ["azure"]="8075 12076 14271 18753 23536 65515 397096 398575"
            ["imperva"]="19551 62571 44932"
            ["stackpath"]="33438 54104"
            ["oracle"]="792 793 794 31898"
            ["cdn77"]="60068 266444"
            ["keycdn"]="44239"
            ["arvancloud"]="202468 22207 205585 208006 210296 57568"
            ["flyio"]="40509"
            ["ddos_guard"]="57724 44556"
            ["hll_llc"]="51115 197068"
            ["ovh"]="16276 35540 17890 36906"
            ["hetzner"]="24940 212317 213230 215859"
            ["namecheap"]="22612 174 1239 286 3257 6939 6453 19437 20454"
            ["ionos"]="8560 15418 51862 54548 8881 8638 20718"
            ["godaddy"]="15891 20773 21499 26496 30148 30605 398787 397522 398101 400749 400754"
            ["amazon_cloufront"]="16509 8987 14618 394089"
            ["google"]="15169 16550 6432 396982 36561 394089 36040 43515 19527 139070"
            ["aws"]="699 16509 14618 19047 9059 8987 133161 55038 24080 58588 7224 10124 17943 64512"
            ["scaleway"]="12876 29447 54265 174 1299 3356 5511 6939"
            ["melbicom"]="8849 6630 50098 49287 44571 174 3356 2914 3257 6453"
            ["cogent"]="174 1281 2149 1790 7346"
            ["datacamp"]="60068 212238 211612 174 3356 1299 2914 3257"
            ["digitalocean"]="14061 62567 202018 201229 393406 31898 1299 3356 174 2914 6453"

            # ВАЖНО: blocked_asn обрабатывается отдельно
            ["blocked_asn"]="13335 11775 34 3292 1680 2860 13692 13727 13693 14237 14627 14670 15083 15224 15626 15897 16391 1267 16802 17054 17426 17452 18229 18747 18779 18978 19224 19624 19969 20326 20853 20915 20940 33905 21581 21785 22652 22890 23028 23471 23352 23693 24994 25697 25829 26068 27284 26832 27257 28323 29838 29873 29863 30320 12400 30938 31727 32132 32181 32552 32489 32613 33028 33198 33333 33442 979 35251 9829 9924 984 9498 906 9246 8943 9294 9299 36323 917 8987 9121 8796 9260 9002 9186 37552 9457 7713 38008 7303 852 12217 8551 8100 8708 4618 6220 6057 4657 4761 12083 4804 5089 44521 44932 45758 46185 46188 46261 46484 46632 46979 48678 49791 50520 50881 51577 51791 51847 51964 53107 53356 54600 398478 398823 55688 55701 55836 55960 56106 58854 59134 59538 59943 60064 60117 60602 60800 61112 61866 61429 64123 63981 64249 132139 11572 198967 199699 199829 199524 134286 134303 134351 135069 135600 135629 136491 136744 150436 151338 151690 151704 152565 152672 153531 153952 153997 136897 136988 137816 138754 138997 139646 139659 139989 140457 140227 140443 141312 146943 149042 200435 200325 200547 200736 200904 201217 201924 201814 201838 201971 202042 202412 202673 202662 202675 11432 203268 203380 203833 204731 205759 205771 206947 206934 207567 207695 208636 208621 209049 209087 209153 209170 209240 209326 209360 209372 209479 209492 209529 209535 209561 209589 209591 209630 209784 209835 209980 209992 210743 210869 210893 211358 210874 211808 211826 212636 212637 213035 213122 213873 213790 213881 215691 215762 215826 216221 263237 263807 263693 263812 263834 265484 266444 264617 267212 266602 269070 268581 272611 271761 328073 328867 393925 43653 43376 395668 42649 396037 396868 396860 396990 43160 41378 399377 41480 400211 399804 401486 401560 400897 10099 10361 1100 10929 34927 34970 35699 35758 35916 36183 36666 399122 399275 399647 40021 40029 400810 40934 37517 38001 393398 393457 39351 394256 394869 395354 395717 396026 396073 396998 397032 397162 397373 397377 398343 398465 398721"
          )

          mkdir -p AS_IP-CIDR

          # Глобальные файлы (без blocked_asn)
          all_global="AS_IP-CIDR/all_providers.txt"
          all_global_v4="AS_IP-CIDR/all_providers_v4.txt"
          all_global_v6="AS_IP-CIDR/all_providers_v6.txt"

          : > "$all_global"
          : > "$all_global_v4"
          : > "$all_global_v6"

          for group in "${!AS_GROUPS[@]}"; do
            echo "Processing group: $group"

            combined="AS_IP-CIDR/${group}_all.txt"
            combined_v4="AS_IP-CIDR/${group}_all_v4.txt"
            combined_v6="AS_IP-CIDR/${group}_all_v6.txt"

            : > "$combined"
            : > "$combined_v4"
            : > "$combined_v6"

            for asn in ${AS_GROUPS[$group]}; do
              echo "  Checking AS$asn availability..."

              url="https://stat.ripe.net/data/announced-prefixes/data.json?resource=AS${asn}"

              status=$(curl -Is --max-redirs 0 "$url" | head -n 1 | awk '{print $2}')

              if [[ "$status" != "200" ]]; then
                echo "  ERROR: HTTP $status for AS$asn — skipping"
                continue
              fi

              json=$(curl -s "$url")

              as_file="AS_IP-CIDR/${group}_${asn}.txt"
              as_file_v4="AS_IP-CIDR/${group}_${asn}_v4.txt"
              as_file_v6="AS_IP-CIDR/${group}_${asn}_v6.txt"

              echo "$json" | jq -r '.data.prefixes[].prefix' | sort -u > "$as_file"
              grep -E '^[0-9]+\.' "$as_file" | sort -u > "$as_file_v4" || true
              grep -E '^[0-9a-fA-F:]+:' "$as_file" | sort -u > "$as_file_v6" || true

              cat "$as_file" >> "$combined"
              cat "$as_file_v4" >> "$combined_v4"
              cat "$as_file_v6" >> "$combined_v6"

              # blocked_asn НЕ добавляется в глобальные списки
              if [[ "$group" != "blocked_asn" ]]; then
                cat "$as_file" >> "$all_global"
                cat "$as_file_v4" >> "$all_global_v4"
                cat "$as_file_v6" >> "$all_global_v6"
              fi
            done

            sort -u "$combined" -o "$combined"
            sort -u "$combined_v4" -o "$combined_v4"
            sort -u "$combined_v6" -o "$combined_v6"

            echo "  Group files saved: $group"
          done

          # Глобальные списки (без blocked_asn)
          sort -u "$all_global" -o "$all_global"
          sort -u "$all_global_v4" -o "$all_global_v4"
          sort -u "$all_global_v6" -o "$all_global_v6"

          echo "Global provider files generated."

      - name: Commit results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add AS_IP-CIDR || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update AS prefix lists"
          git push
