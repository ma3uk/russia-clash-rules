name: Fetch AS Prefixes

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  fetch-prefixes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch prefixes for AS list
        run: |
          declare -A AS_GROUPS=(
            ["cloudflare"]="13335 14789 132892"
            ["aws"]="699 16509 14618"
            ["hetzner"]="24940 213230"
          )

          mkdir -p AS_IP-CIDR

          # Глобальные файлы для всех провайдеров
          all_global="AS_IP-CIDR/all_providers.txt"
          all_global_v4="AS_IP-CIDR/all_providers_v4.txt"
          all_global_v6="AS_IP-CIDR/all_providers_v6.txt"

          : > "$all_global"
          : > "$all_global_v4"
          : > "$all_global_v6"

          for group in "${!AS_GROUPS[@]}"; do
            echo "Processing group: $group"

            combined="AS_IP-CIDR/${group}_all.txt"
            combined_v4="AS_IP-CIDR/${group}_all_v4.txt"
            combined_v6="AS_IP-CIDR/${group}_all_v6.txt"

            : > "$combined"
            : > "$combined_v4"
            : > "$combined_v6"

            for asn in ${AS_GROUPS[$group]}; do
              echo "  Checking AS$asn availability..."

              url="https://stat.ripe.net/data/announced-prefixes/data.json?resource=AS${asn}"

              # Проверка доступности без редиректов
              status=$(curl -Is --max-redirs 0 "$url" | head -n 1 | awk '{print $2}')

              if [[ -z "$status" ]]; then
                echo "  ERROR: No response from server for AS$asn"
                continue
              fi

              if [[ "$status" -ge 300 && "$status" -lt 400 ]]; then
                echo "  ERROR: Redirect detected ($status) for AS$asn — skipping"
                continue
              fi

              if [[ "$status" -ne 200 ]]; then
                echo "  ERROR: Server returned HTTP $status for AS$asn — skipping"
                continue
              fi

              echo "  AS$asn is available (HTTP 200). Downloading..."

              json=$(curl -s "$url")

              as_file="AS_IP-CIDR/${group}_${asn}.txt"
              as_file_v4="AS_IP-CIDR/${group}_${asn}_v4.txt"
              as_file_v6="AS_IP-CIDR/${group}_${asn}_v6.txt"

              # Все префиксы
              echo "$json" | jq -r '.data.prefixes[].prefix' > "$as_file"

              # IPv4
              grep -E '^[0-9]+\.' "$as_file" > "$as_file_v4" || true

              # IPv6
              grep -E '^[0-9a-fA-F:]+:' "$as_file" > "$as_file_v6" || true

              # В групповые файлы
              cat "$as_file" >> "$combined"
              cat "$as_file_v4" >> "$combined_v4"
              cat "$as_file_v6" >> "$combined_v6"

              # В глобальные файлы
              cat "$as_file" >> "$all_global"
              cat "$as_file_v4" >> "$all_global_v4"
              cat "$as_file_v6" >> "$all_global_v6"
            done

            # Убираем дубликаты и сортируем
            sort -u "$combined" -o "$combined"
            sort -u "$combined_v4" -o "$combined_v4"
            sort -u "$combined_v6" -o "$combined_v6"

            echo "  Group files saved: $group"
          done

          # Глобальные файлы для всех провайдеров
          sort -u "$all_global" -o "$all_global"
          sort -u "$all_global_v4" -o "$all_global_v4"
          sort -u "$all_global_v6" -o "$all_global_v6"

          echo "Global provider files generated."

      - name: Commit results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add AS_IP-CIDR || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update AS prefix lists"
          git push
