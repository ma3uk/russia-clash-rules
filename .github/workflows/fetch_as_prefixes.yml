name: Fetch AS Prefixes

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # ежедневный запуск в 03:00

jobs:
  fetch-prefixes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Prepare output directory
        run: mkdir -p AS_IP-CIDR

      - name: Fetch prefixes for AS list
        run: |
          declare -A AS_GROUPS=(
            ["cloudflare"]="13335 14789 132892"
            ["aws"]="699 16509 14618"
            ["hetzner"]="24940 213230"
          )

          for group in "${!AS_GROUPS[@]}"; do
            for asn in ${AS_GROUPS[$group]}; do
              echo "Processing $group / AS$asn"

              url="https://stat.ripe.net/data/announced-prefixes/data.json?resource=AS${asn}"

              json=$(curl -s "$url")

              echo "$json" | jq -r '.data.prefixes[].prefix' > "AS_IP-CIDR/${group}_${asn}.txt"

              echo "Saved: AS_IP-CIDR/${group}_${asn}.txt"
            done
          done

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add AS_IP-CIDR
          git commit -m "Update AS prefix lists" || echo "No changes"
          git push
